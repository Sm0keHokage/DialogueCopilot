services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: twitchguard
      POSTGRES_PASSWORD: twitchguard
      POSTGRES_DB: twitchguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twitchguard"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    # DR-10: raw chat is a transient buffer only — Redis persistence is off.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://twitchguard:twitchguard@db:5432/twitchguard
      REDIS_URL: redis://redis:6379/0
      CONFIG_FILE: /app/config.yaml
      SESSION_COOKIE_SECURE: "false"        # local http; set true behind TLS
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
