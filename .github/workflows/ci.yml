# NFR-Main-02: lint + types + tests are blocking. The pytest suite includes the
# security log-grep check (AC-03) and the "no password inputs" check (AC-01).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitchguard/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Types (mypy)
        run: mypy src
      - name: Tests (pytest, incl. security greps)
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twitchguard/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck + build (tsc strict + vite)
        run: npm run build
